hook_patterns:
  危机钩:
    description: 危险逼近或敌人出现，触发读者紧张感
    keywords:
      - 危险
      - 危机
      - 敌人出现
      - 死亡威胁
      - 危机四伏
      - 生死关头
    position_weight:
      开篇: 1.2
      中段: 1.0
      结尾: 1.5
    strength_base: 0.7

  悬念钩:
    description: 制造信息缺口，引发读者好奇心
    keywords:
      - 未解之谜
      - 悬念
      - 秘密
      - 隐藏
      - 真相是
      - 令人费解
    position_weight:
      开篇: 1.5
      中段: 1.0
      结尾: 1.2
    strength_base: 0.6

  渴望钩:
    description: 让读者期待好事发生
    keywords:
      - 期待
      - 好事将近
      - 奖励
      - 突破在即
      - 即将获得
      - 希望
    position_weight:
      中段: 1.3
      结尾: 1.4
    strength_base: 0.5

  情绪钩:
    description: 触发强烈情感反应
    keywords:
      - 震惊
      - 愤怒
      - 感动
      - 心疼
      - 爆笑
      - 热泪盈眶
    position_weight:
      开篇: 1.2
      中段: 1.0
      结尾: 1.1
    strength_base: 0.6

  选择钩:
    description: 高风险决策驱动情节
    keywords:
      - 必须选择
      - 艰难决定
      - 赌上一切
      - 生死抉择
      - 两难
    position_weight:
      结尾: 1.5
      中段: 1.2
    strength_base: 0.7