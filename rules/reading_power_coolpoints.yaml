coolpoint_patterns:
  装逼打脸:
    description: 展示实力后打脸对方
    triggers:
      - 打脸
      - 反杀
      - 碾压
      - 震惊
      - 目瞪口呆
      - 啪啪打脸
    emotion_intensity: 0.9
    combo_potential:
      - 扮猪吃虎
      - 越级反杀

  扮猪吃虎:
    description: 故意示弱后突然展示实力
    triggers:
      - 隐藏实力
      - 示弱
      - 伪装
      - 低调
      - 不为人知
      - 原来是他
    emotion_intensity: 0.85
    combo_potential:
      - 装逼打脸
      - 身份掉马

  越级反杀:
    description: 以弱胜强，越级挑战胜利
    triggers:
      - 越级
      - 反杀
      - 跨阶
      - 逆袭
      - 以下克上
    emotion_intensity: 0.95
    combo_potential:
      - 装逼打脸

  迪化误解:
    description: 对方错误判断主角实力
    triggers:
      - 误解
      - 以为
      - 以为是
      - 错估
      - 大跌眼镜
    emotion_intensity: 0.75
    combo_potential:
      - 扮猪吃虎
      - 身份掉马

  身份掉马:
    description: 隐藏身份突然揭露
    triggers:
      - 身份暴露
      - 原来是
      - 真相大白
      - 马甲掉落
      - 揭晓
    emotion_intensity: 0.8
    combo_potential:
      - 扮猪吃虎
      - 装逼打脸