# 检测器白名单 - 用于误报规避
# 当检测结果命中白名单时，自动跳过该检测

# 场景白名单：特定场景下的检测跳过
scene_whitelist:
  - scene_type: "cosmic"
    skip_checkers: ["timeline_checker"]
    reason: "宇宙级场景时间流异常"
  - scene_type: "game_world"
    skip_checkers: ["timeline_checker", "character_state_checker"]
    reason: "虚拟世界设定特殊"
  - scene_type: "dream"
    skip_checkers: ["timeline_checker", "ability_checker"]
    reason: "梦境场景逻辑特殊"

# 角色白名单：特定角色在特定场景下不检测
character_whitelist:
  - character: "星澜"
    skip_checkers: ["character_agency_checker"]
    reason: "反派角色行为模式特殊"
  - character: "虚无之主"
    skip_checkers: ["character_state_checker", "timeline_checker"]
    reason: "宇宙级存在状态特殊"

# 词汇白名单：特定词汇在特定语境下不触发检测
vocabulary_whitelist:
  - keyword: "牺牲"
    skip_checker: "character_state"
    context_pattern: "的牺牲"
    reason: "固定搭配不表示死亡"
  - keyword: "永恒"
    skip_checker: "timeline_checker"
    scene_types: ["cosmic", "dream"]
    reason: "宇宙/梦境场景常用词"

# 反向白名单：强制触发检测的场景（即使在其他白名单中）
force_check_whitelist:
  - chapter_range: "1-30"
    force_checkers: ["character_agency_checker"]
    reason: "前期章节需确保角色塑造"