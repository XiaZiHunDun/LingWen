# 都市风格指南
# 版本: v1.0.0
# 更新日期: 2026-05-19

schema_version: "v1.0"

style_info:
  genre: 都市
  base_temperature: 0.65
  description: "都市小说风格指南，包含现代都市背景下的商战、职场、情感等作品"

# ==================== 语言风格 ====================
language_style:
  整体基调:
    - 现代白话为主，简洁明快
    - 都市气息浓厚
    - 生活化但不失文学性
    - 口语与书面语自然融合

  词汇特征:
    动词: ["碾压", "逆袭", "布局", "破局", "掌控", "崛起", "翻盘"]
    名词: ["人脉", "资源", "格局", "圈层", "赛道", "风口", "红利"]
    形容词: ["精致", "低调", "高端", "极致", "纯粹", "犀利"]
    副词: ["迅速", "精准", "果断", "悄然", "彻底"]

  句式特点:
    - 短句为主，信息密度高
    - 善用对话推进情节
    - 段落短小，节奏快
    - 段落内逻辑紧凑

# ==================== 描写规范 ====================
description_standards:
  场景描写:
    职场场景:
      - 办公室：格子间、会议室、写字楼
      - 细节：咖啡香气、键盘敲击声、打印机声
      - 氛围：竞争、合作、晋升

    商业场景:
      - 谈判桌、宴会厅、董事会议室
      - 穿着：西装、礼服、职业装
      - 细节：腕表、领带、手袋

    日常生活:
      - 咖啡馆、餐厅、健身房
      - 城市地标：CBD、写字楼、商场
      - 小资情调与烟火气并存

    情感场景:
      - 卧室、车内、雨夜
      - 细腻的心理描写
      - 环境与情感呼应

  人物描写:
    外貌:
      - 都市精英：职业装、精致妆容/面容
      - 普通白领：朴素、自然
      - 富豪阶层：低调奢华、有品位
      - 常用比喻：干净利落、气质如兰

    心理:
      - 现实压力：房贷、车贷、KPI
      - 职场心理：竞争、焦虑、成长
      - 情感心理：独立、依赖、纠结

  商战描写:
    - 谈判：言语交锋、利益博弈
    - 竞争：策略、资源、情报
    - 危机：转机、绝境逆袭
    - 结果：利益重新分配

# ==================== 对话规范 ====================
dialogue_style:
  职场对话:
    - 简洁专业，不废话
    - 潜台词丰富，职场黑话
    - 上下级对话有尊称
    - 同事对话轻松自然

  商务对话:
    - 礼貌中带距离
    - 利益导向
    - 机锋暗藏
    - 专业术语运用

  情感对话:
    - 现代年轻人的表达方式
    - 直接但不直白
    - 借事说情
    - 行动大于言语

# ==================== 节奏规范 ====================
pacing_standards:
  章节节奏:
    开篇:
      - 场景快速建立
      - 立刻切入核心冲突
      - 信息量大但不堆砌

    中段:
      - 快节奏推进
      - 支线简洁
      - 核心冲突层层递进

    结尾:
      - 高潮或悬念
      - 留钩子
      - 情感落点或情节转折

  商战节奏:
    - 铺垫：格局建立
    - 发展：矛盾积累
    - 高潮：正面对决
    - 结局：利益重新分配

  情感节奏:
    - 相遇：心动或冲突
    - 发展：暧昧、拉扯
    - 转折：危机或表白
    - 结果：在一起或分离

# ==================== 禁忌事项 ====================
prohibited:
  用词:
    - 过于古雅的词汇
    - 脱离时代的描述
    - 过度煽情
    - 不切实际的意淫

  情节:
    - 主角开挂无极限
    - 反派智商不在线
    - 感情线狗血老套
    - 商战脱离现实

  风格:
    - 过度描写穿着品牌
    - 连续的华丽辞藻
    - 不现代的表达方式
    - 过于理想化的设定

# ==================== 优秀示例参考 ====================
reference_examples:
  场景描写:
    - 办公室："落地窗外是CBD的夜景，霓虹灯在玻璃幕墙上投下斑驳的光影。他站在窗前，手里端着刚续杯的美式咖啡"
    - 商业谈判："对方代表的手指在桌面上轻轻敲击，每一下都像是在计算什么。张总知道，这是试探，也是施压"

  人物描写:
    - 女主出场："她穿着一身剪裁得体的黑色职业装，长发在脑后挽成利落的马尾。走路带风，高跟鞋在大理石地面上敲出清脆的节奏"
    - 男主出场："他靠在椅背上，姿态闲适，但眼神锐利得像是在审视什么。那双眼睛仿佛能看穿一切伪装"

  心理描写:
    - 职场焦虑："她看着电脑屏幕上的KPI进度条，数字还在跳动，像是某种无声的嘲讽。月底了，还差30%。"
    - 情感心动："他不知道什么时候开始，会在开会的时候不自觉地寻找她的身影。这个发现让他有些烦躁"

  对话示例:
    - 职场对话："这个方案，明天早上九点之前发到我邮箱。另外，数据再核实一遍，我不想在董事会上被问倒"
    - 情感对话："你知道我为什么总是不主动联系你吗？因为我怕一旦开始，就再也停不下来了"

# ==================== 温度参数参考 ====================
temperature_recommendations:
  大纲生成: 0.6
  职场场景: 0.6
  商战场景: 0.7
  情感场景: 0.7
  日常场景: 0.6
  喜剧场景: 0.75
  悬疑场景: 0.65

# ==================== 质量检查清单 ====================
quality_checklist:
  - label: "语言风格符合都市设定"
    description: "现代白话，简洁明快，无古语"
  - label: "职场描写专业真实"
    description: "行业细节真实可信"
  - label: "人物心理符合现实"
    description: "现实压力、职场焦虑真实"
  - label: "商战逻辑自洽"
    description: "策略合理，博弈精彩"
  - label: "情感表达现代自然"
    description: "直接但不直白，有余韵"
  - label: "节奏明快不拖沓"
    description: "信息密度高，阅读流畅"