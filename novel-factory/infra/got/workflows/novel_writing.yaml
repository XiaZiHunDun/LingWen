# 灵文 GoT · novel_writing 工作流 v2
#
# Doc 4 (GoT 适配设计 v1.0) §7 — 章节写作最小工作流
#
# 7 阶段 + AGGREGATION (Phase 7.4):
#   read_snapshot → write_chapter → review_chapter
#                   ├→ polish_emotional_pacing ─┐
#                   └→ polish_ai_trace_removal ─┤
#                                              └→ polish_merge → emit_chapter
# 覆盖 PoC 范围 (1+4 端到端跑通 1 卷 50 章)
#
# 不实施 (后续阶段):
# - 并行 batch (e.g. review + foreshadow_scan 一起跑)
# - backtrack 软回溯 (<=2) 集成到 scheduler run 循环
# - 4 个 subplot 各自的工作流变体
# - 真并行执行 polish 节点 (scheduler 串行 for nid in ready, 但 ready 时 2 节点同 ready)
# ✓ Phase 7.4 实现: 多 variant 并行 + AGGREGATION merge (5→7 节点)

workflow: novel_writing
version: 2  # 升级: 5→7 节点 + AGGREGATION 引入

nodes:
  # === Stage 1: 数据输入 ===
  - id: read_snapshot
    type: input
    name: Read WorldSnapshot
    description: 读取当前 WorldSnapshot (角色 / 设定 / 已写章节摘要)
    depends_on: []
    prompt_scenario: null
    output_schema: null
    token_budget: 0
    timeout_s: 30

  # === Stage 2: 内容生成 ===
  - id: write_chapter
    type: generation
    name: Write Chapter
    description: 根据 WorldSnapshot + 主线约束,生成章节正文
    depends_on: [read_snapshot]
    prompt_scenario: chapter_writing
    output_schema: ChapterDraft
    token_budget: 8000
    timeout_s: 120

  # === Stage 3: 质量审核 ===
  - id: review_chapter
    type: evaluation
    name: Review Chapter
    description: 对章节做 S1-S8 质量审核 + LLM 深度质检
    depends_on: [write_chapter]
    prompt_scenario: chapter_review
    output_schema: QualityReport
    token_budget: 4000
    timeout_s: 90

  # === Stage 3.6: 并行多变体润色 (Phase 7.4) ===
  # review_chapter 后分叉, 两个节点无相互依赖, 同时 ready
  - id: polish_emotional_pacing
    type: synthesis
    name: Polish Emotional Pacing
    description: 情绪节奏 variant — 对话自然化 (LLM) + 节奏调整 (LLM), 跳过去 AI 痕迹规则
    depends_on: [review_chapter]
    prompt_scenario: emotional_pacing
    output_schema: PolishedDraft
    token_budget: 6000
    timeout_s: 90

  - id: polish_ai_trace_removal
    type: synthesis
    name: Polish AI Trace Removal
    description: AI 痕迹 variant — 规则去 AI 痕迹 + 对话自然化 (LLM), 跳过节奏 LLM
    depends_on: [review_chapter]
    prompt_scenario: ai_trace_removal
    output_schema: PolishedDraft
    token_budget: 6000
    timeout_s: 90

  # === Stage 3.7: AGGREGATION 合并 (Phase 7.4 NEW) ===
  - id: polish_merge
    type: aggregation
    name: Merge Polish Variants
    description: "合并 2 个并行 polish 节点结果 (Phase 7.4 策略: max(len) 选较长版本)"
    depends_on: [polish_emotional_pacing, polish_ai_trace_removal]
    prompt_scenario: polish_merge
    output_schema: PolishedDraft
    token_budget: 0
    timeout_s: 30

  # === Stage 4: 落盘输出 (Phase 7.4: 改 depends_on) ===
  - id: emit_chapter
    type: output
    name: Emit Chapter
    description: 将合并润色后的章节写入 content_repo + 更新索引
    depends_on: [polish_merge]    # ← 改: 从 [polish_chapter] 改为 [polish_merge]
    prompt_scenario: null
    output_schema: null
    token_budget: 0
    timeout_s: 30
