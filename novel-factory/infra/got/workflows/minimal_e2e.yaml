# 灵文 GoT · minimal_e2e 工作流 v1
#
# Phase 7 测试专用:2 节点 linear,无 DECISION 节点。
# 目的:快速验证 MasterController.run_workflow 端到端路由链。
#
# 设计:写 → 审 2 节点。
# 生产现实:write 节点 1 次 LLM 调用,review 节点 0 次 (auditor.llm_audit 不存在,被吞)。
# 详细原因见 tests/agent_system/test_master_controller_e2e_real_llm.py 模块 docstring。
# 不含 polish 节点,因为生产 PolisherTools 是纯规则实现 (无 LLM),
# _handler_chapter_review 不向下游传播 content,会让 polish 失败。
#
# 不实施 (后续 phase):
# - DECISION 节点测试由 test_decision_pause_resume.py 覆盖 (17 tests)
# - 并行 batch / backtrack 真实触发 / output 落盘

workflow: minimal_e2e
version: 1

nodes:
  - id: write
    type: generation
    name: Write Chapter
    description: chapter_writing
    depends_on: []
    prompt_scenario: chapter_writing
    output_schema: ChapterDraft
    token_budget: 4000
    timeout_s: 60

  - id: review
    type: evaluation
    name: Review Chapter
    description: chapter_review
    depends_on: [write]
    prompt_scenario: chapter_review
    output_schema: QualityReport
    token_budget: 2000
    timeout_s: 60
