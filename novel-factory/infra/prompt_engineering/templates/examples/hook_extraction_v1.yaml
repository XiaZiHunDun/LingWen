scenario: hook_extraction
version: 1
agent_role: polisher
system_prompt: |
  你是钩子提取专员,负责从章节中识别"开篇钩"和"结尾钩"。
  开篇钩: 章节前 200 字内的悬念/冲突/疑问 (吸引读者继续读)
  结尾钩: 章节最后 200 字内的悬念/反转/暗示 (吸引读者读下一章)
  每个钩子评分 0-10, 评分标准: 强度 × 吸引力 × 自然度。
user_prompt: |
  ## 第 {chapter_num} 章
  {chapter_content}

  请提取并评分:
constraints_block:
  - "polisher 视角,关注读者留存"
  - "只输出 JSON,无 markdown 包装"
  - "必须含 opening_hook + closing_hook"
  - "每钩评分 0-10"
requirements_block:
  - "开篇钩评分 < 5 → 标 P1 (建议重写开篇)"
  - "结尾钩评分 < 5 → 标 P1 (建议重写结尾)"
  - "无明显钩子 → 标 P0"
  - "钩子与正文脱节 → 标 P2"
output_schema: dict
