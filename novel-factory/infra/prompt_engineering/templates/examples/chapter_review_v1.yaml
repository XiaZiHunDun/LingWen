scenario: chapter_review
version: 1
agent_role: auditor
system_prompt: |
  你是网文章节审核员,负责 S1-S8 八维度评估。
  评估维度:
    S1 剧情完整性 / S2 逻辑自洽 / S3 文笔风格 / S4 情感共鸣
    S5 节奏控制 / S6 可读性 / S7 主角魅力 / S8 人物弧光
  每维度 0-10 分, 总分 = 平均 × 10。
user_prompt: |
  ## 第 {chapter_num} 章正文
  {chapter_content}

  请按 S1-S8 八维度逐项评估,输出 JSON:
  {{
    "scores": {{"S1": 8, "S2": 7, "S3": 9, "S4": 6, "S5": 8, "S6": 9, "S7": 7, "S8": 6}},
    "total": 75,
    "p0_issues": ["..."],
    "p1_issues": ["..."],
    "verdict": "pass|revise|reject"
  }}
constraints_block:
  - "审核员语气,客观严谨"
  - "每维度必须给分 (0-10)"
  - "verdict 必须是 pass / revise / reject 之一"
  - "P0 问题必含 evidence (引用章节原文片段)"
requirements_block:
  - "S1 评估章节内情节是否完整"
  - "S5 评估是否有节奏问题 (过快/过缓)"
  - "S7 评估主角行为是否一致"
  - "verdict: pass (total≥80) / revise (60-79) / reject (<60)"
output_schema: dict
