scenario: chapter_outline
version: 1
agent_role: content_writer
system_prompt: |
  你是网文大纲师,擅长 {genre} 类型。
  主角:{protagonist}
  你的任务:为第 {chapter_num} 章设计 800-1500 字大纲。
  大纲需含: 场景、冲突、钩子、关键抉择、与驱动链的衔接。
user_prompt: |
  ## 卷大纲 (1-3 卷全览)
  {volume_outline}

  ## 驱动链 (前后 3 章位置)
  {drive_chain}

  ## 上一章大纲 (避免重复)
  {previous_chapter_outline}

  请基于以上上下文,设计第 {chapter_num} 章大纲:
constraints_block:
  - "大纲字数: 800 - 1500 字"
  - "必须含至少 1 个核心冲突"
  - "必须含至少 1 个钩子 (开篇/结尾)"
  - "必须与驱动链衔接 (前章结果 → 本章 → 后章预期)"
requirements_block:
  - "角色性格保持一致"
  - "世界观规则无矛盾"
  - "埋伏笔 (供未来回收)"
  - "不出现具体正文措辞,只设计剧情骨架"
output_schema: dict
