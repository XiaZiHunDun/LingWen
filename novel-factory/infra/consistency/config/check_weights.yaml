# 检查器权重配置
# 版本: v1.0.0
# 更新日期: 2026-05-19

schema_version: "v1.0"

# ==================== 质量维度权重 ====================
quality_dimensions:
  S1:
    name: "剧情完整性"
    description: "主线完整，支线有交代，情节推进合理"
    weight: 0.20

  S2:
    name: "逻辑自洽"
    description: "逻辑通顺，无明显漏洞，前后一致"
    weight: 0.20

  S3:
    name: "文笔风格"
    description: "语言流畅，风格统一，表达有力"
    weight: 0.15

  S4:
    name: "情感共鸣"
    description: "情感真实，能引发读者共鸣"
    weight: 0.10

  S5:
    name: "节奏控制"
    description: "张弛有度，高潮和缓冲处理得当"
    weight: 0.10

  S6:
    name: "可读性"
    description: "阅读流畅，逻辑清晰，容易理解"
    weight: 0.10

  S7:
    name: "主角魅力"
    description: "主角有吸引力，行为有魅力"
    weight: 0.08

  S8:
    name: "人物弧光"
    description: "角色有成长，弧光完整"
    weight: 0.07

# ==================== 检查器权重 ====================
checker_weights:
  character_checker:
    name: "角色一致性"
    dimensions: ["S2", "S7"]
    dimension_weights:
      S2: 0.6
      S7: 0.4
    base_score: 100
    penalty_per_issue:
      P0: 50
      P1: 20
      P2: 5
      P3: 1

  item_checker:
    name: "物品连续性"
    dimensions: ["S2"]
    dimension_weights:
      S2: 1.0
    base_score: 100
    penalty_per_issue:
      P0: 30
      P1: 15
      P2: 3
      P3: 0

  timeline_checker:
    name: "时间线合理性"
    dimensions: ["S2", "S5"]
    dimension_weights:
      S2: 0.7
      S5: 0.3
    base_score: 100
    penalty_per_issue:
      P0: 40
      P1: 15
      P2: 3
      P3: 0

  ability_checker:
    name: "能力一致性"
    dimensions: ["S2"]
    dimension_weights:
      S2: 1.0
    base_score: 100
    penalty_per_issue:
      P0: 35
      P1: 15
      P2: 3
      P3: 0

  personality_checker:
    name: "人设稳定性"
    dimensions: ["S2", "S7"]
    dimension_weights:
      S2: 0.5
      S7: 0.5
    base_score: 100
    penalty_per_issue:
      P0: 45
      P1: 20
      P2: 5
      P3: 1

  foreshadow_checker:
    name: "伏笔回收"
    dimensions: ["S1", "S2"]
    dimension_weights:
      S1: 0.6
      S2: 0.4
    base_score: 100
    penalty_per_issue:
      P0: 0  # 伏笔无P0
      P1: 15
      P2: 3
      P3: 0

  outline_checker:
    name: "大纲偏离度"
    dimensions: ["S1", "S5"]
    dimension_weights:
      S1: 0.6
      S5: 0.4
    base_score: 100
    penalty_per_issue:
      P0: 40
      P1: 15
      P2: 3
      P3: 0

  ai_gloss_checker:
    name: "AI痕迹检测"
    dimensions: ["S3"]
    dimension_weights:
      S3: 1.0
    base_score: 100
    penalty_per_issue:
      P0: 0
      P1: 0
      P2: 0
      P3: 2  # AI痕迹主要是P3

# ==================== 最终评分计算 ====================
scoring:
  base_score: 100

  issue_multipliers:
    P0: 3.0  # P0问题权重3倍
    P1: 1.5  # P1问题权重1.5倍
    P2: 1.0  # P2问题权重1倍
    P3: 0.5  # P3问题权重0.5倍

  deduction_cap: 50  # 最多扣50分

  pass_thresholds:
    auto_pass: 90  # >=90分自动通过
    review: 75     # 75-90分需要审核
    fail: 75       # <75分不通过

# ==================== 检查优先级 ====================
check_priority:
  critical:
    - character_checker
    - ability_checker

  important:
    - timeline_checker
    - item_checker
    - outline_checker

  standard:
    - personality_checker
    - foreshadow_checker

  optional:
    - ai_gloss_checker

# ==================== 检查范围 ====================
check_scope:
  default: "all"

  options:
    all: "全部8个检查器"
    critical: "仅critical级别检查器"
    important: "critical + important"
    custom: "自定义选择"

  scope_to_checkers:
    all: ["character_checker", "item_checker", "timeline_checker",
          "ability_checker", "personality_checker", "foreshadow_checker",
          "outline_checker", "ai_gloss_checker"]
    critical: ["character_checker", "ability_checker"]
    important: ["character_checker", "ability_checker", "timeline_checker",
                "item_checker", "outline_checker"]
    standard: ["character_checker", "item_checker", "timeline_checker",
               "ability_checker", "personality_checker", "foreshadow_checker"]