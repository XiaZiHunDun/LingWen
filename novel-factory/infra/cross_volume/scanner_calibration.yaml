# Phase 9.34 F19: LLM scanner / edge inferrer confidence thresholds (externalized).
# Defaults match Phase 9.12 hardcoded values (backward compat).

version: 1

# Min confidence to persist LLM-scanned nodes (backfill --use-llm --apply)
node_write_threshold: 3

# Min node confidence passed into edge inference (EdgeInferrer filter)
edge_infer_threshold: 3

# Sweep range for ripple-scan --calibrate report
calibrate_threshold_min: 1
calibrate_threshold_max: 5
