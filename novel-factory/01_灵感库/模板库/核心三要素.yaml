# 核心三要素模板

> 每个项目立项时必须填写。
> 参照：10_方法论/02_核心三要素.md

---

## 一句话主角

**公式**：`身份 + 性格 + 执念/短板`

```yaml
protagonist_one_liner: "..."
# 示例："退伍军人 + 铁血硬汉 + 极度害怕被抛弃"
```

---

## 核心目标（唯一主目标）

```yaml
primary_goal:
  一句话描述: "..."
  具体化: "在X时间内做Y事"
  贯穿全书: true/false

  # 示例
  # 一句话描述: "赢得联赛冠军"
  # 具体化: "三个月内练成绝招，在联赛决赛中击败卫冕冠军"
  # 贯穿全书: true
```

---

## 最大阻碍

```yaml
obstacle:
  主要阻碍:
    类型: "外在反派 / 自身缺陷 / 社会环境"
    描述: "..."

  层层阻碍:
    - "阻碍1：..."
    - "阻碍2：..."
    - "阻碍3：..."

  # 最佳组合：外在反派 + 自身缺陷
  # 示例：强劲对手（外在）+ 自己会在关键时刻发作的PTSD（内在）
```

---

## 欲望与恐惧冲突（故事引擎）

```yaml
desire_fear_conflict:
  欲望: "人物最想要什么"
  恐惧: "人物最怕失去什么"
  冲突说明: "欲望和恐惧如何推动故事"

  # 示例
  # 欲望: "被认可，被接纳"
  # 恐惧: "被抛弃"
  # 冲突说明: "想要被接纳，但又本能地推开所有人"
```

---

## 代价（失败后果）

```yaml
stakes:
  如果失败: "..."
  代价级别: "致命 / 严重 / 中等"
  代价描述: "..."

  # 示例
  # 如果失败: "永远无法证明自己的价值，女友离开，活在阴影里"
  # 代价级别: "致命"
```

---

## 三要素速查表

| 要素 | 问题 | 答案 |
|------|------|------|
| 主角 | 他是谁？性格？最大软肋？ | ... |
| 目标 | 他想要什么？具体是什么？ | ... |
| 阻碍 | 谁/什么阻止他？ | ... |
| 代价 | 失败会怎样？ | ... |

