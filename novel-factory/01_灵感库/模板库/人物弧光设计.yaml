## 人物关系网

| 关系类型 | 对方 | 冲突点 |
|---------|------|--------|
| 爱（亲情/友情/爱情） | ... | ... |
| 仇恨（复仇/背叛/嫉妒） | ... | ... |
| 师徒/上下级 | ... | ... |
| 对手/竞争 | ... | ... |

---

## 人物小传（仅作者可见）

```yaml
background: "经历过的重大事件（塑造了他的现在）"
secret: "不愿被人知道的过去"
口头禅: "..."
习惯动作: "..."
价值观: "他相信什么是对的？"
矛盾点: "他嘴上说的 vs 实际做的"
```

---

## 检查清单

- [ ] 欲望与恐惧的冲突是故事引擎
- [ ] 有缺陷，不是"完美的人"
- [ ] 故事结束时有成长/领悟/改变
- [ ] 配角不超过5个主要人物
- [ ] 反派有立场、有苦衷，不纯粹邪恶

---

## 使用说明

1. 项目立项后，为每个主要角色填写本模板
2. 放入项目立项目录：`01_灵感库/{项目}/立项/人物弧光/`
3. 大纲和正文创作时参照，确保弧光一致性