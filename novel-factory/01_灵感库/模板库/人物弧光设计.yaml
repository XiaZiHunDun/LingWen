# 人物弧光设计模板

> 每个主要角色填写一份。
> 参照：10_方法论/04_人物塑造体系.md

---

## 角色基础信息

```yaml
character_name: "..."
role_type: "主角/配角/反派/镜像型/导师型/帮手型"
```

---

## 核心三角

```yaml
core_triangle:
  欲望: "人物最想要什么"
  恐惧: "人物最怕失去什么"
  缺陷: "什么性格缺陷阻止他"

  # 示例：
  # 欲望: "被认可，被接纳"
  # 恐惧: "被抛弃"
  # 缺陷: "不信任人，偏执"
```

---

## 人物弧光设计

### 三问

| 问题 | 答案 |
|------|------|
| **故事开始时，这个人相信什么？** | ... |
| **过程中，什么让他付出代价？（考验）** | ... |
| **故事结束时，他领悟/改变了什么？（成长）** | ... |

### 弧光类型

```yaml
arc_type: "成长型 / 堕落型 / 领悟型 / 救赎型 / 循环型"

arc_stages:
  - stage: "初始状态"
    description: "..."
    chapters: "chXXX-chYYY"

  - stage: "遭遇考验"
    description: "..."
    chapters: "chXXX-chYYY"

  - stage: "最低谷"
    description: "..."
    chapters: "chXXX-chYYY"

  - stage: "转变/领悟"
    description: "..."
    chapters: "chXXX-chYYY"

  - stage: "结局状态"
    description: "..."
    chapters: "chXXX-chYYY"
```

