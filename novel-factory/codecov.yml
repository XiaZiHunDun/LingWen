# Phase 8.44.4: Codecov config — 跨 vitest (frontend) + pytest (backend) 合并报
# 2 flags 隔离 (frontend + backend), 1 PR 同时改两边时, Codecov 等 2 build 都跑完
# 才 comment (after_n_builds: 2). wait_for_ci + require_ci_to_pass 防 Codecov 在
# CI fail 时误报. require_head: true + require_base: false 让 fork PR 也能报.

codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 2  # 1 frontend (vitest) + 1 backend (pytest, 3.13 only)
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...90"

flags:
  frontend:
    paths:
      - dashboard/frontend/src/
  backend:
    paths:
      - infra/
      - tools/
      - dashboard/

comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
