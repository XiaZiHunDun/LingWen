# 高概念创意库
# 用途：对抗AI内容套路化问题，注入新鲜感

高概念创意:
  - id: "HC001"
    名称: "时间悖论循环"
    描述: "主角的行动导致了一个悖论，必须在未来阻止自己"
    适用场景: "高潮转折"
    反套路标签: ["非升级流", "智慧主导", "命运对抗"]

  - id: "HC002"
    名称: "盟友即敌人"
    描述: "最信任的同伴是最终Boss的化身"
    适用场景: "信任危机"
    反套路标签: ["背叛循环", "无真正盟友", "身份危机"]

  - id: "HC003"
    名称: "力量代价"
    描述: "每次使用重大力量都会失去一段记忆"
    适用场景: "能力使用"
    反套路标签: ["成长非线性的", "记忆驱动", "代价系统"]

  - id: "HC004"
    名称: "沉默主角"
    描述: "主角几乎不说话，靠行动而非台词塑造"
    适用场景: "人物塑造"
    反套路标签: ["去话语中心", "行动驱动", "神秘主角"]

  - id: "HC005"
    名称: "双赢结局"
    描述: "最终不是打败敌人，而是找到共存之道"
    适用场景: "结局设计"
    反套路标签: ["非零和", "和解导向", "共存哲学"]

  - id: "HC006"
    名称: "倒计时叙事"
    描述: "故事从结局开始叙述，每章向开头回溯"
    适用场景: "结构创新"
    反套路标签: ["非线性叙事", "悬念导向", "结构实验"]

  - id: "HC007"
    名称: "无英雄主角"
    描述: "主角不想成为英雄，被迫卷入却始终抗拒"
    适用场景: "角色塑造"
    反套路标签: ["反英雄", "被动英雄", "内心抗拒"]

  - id: "HC008"
    名称: "知识诅咒"
    描述: "主角知道未来的灾难，但无法说服他人相信"
    适用场景: "冲突构建"
    反套路标签: ["预言者困境", "沟通失效", "孤独先知"]

  - id: "HC009"
    名称: "镜像反派"
    描述: "反派与主角有相似背景，做出不同选择"
    适用场景: "对立设计"
    反套路标签: ["理念对立", "殊途同归", "镜像命运"]

  - id: "HC010"
    名称: "牺牲无意义"
    描述: "主角的牺牲没有换来预期结果，代价浪费"
    适用场景: "转折设计"
    反套路标签: ["悲剧导向", "代价与收获不对等", "无用牺牲"]

  - id: "HC011"
    名称: "选择无好坏"
    描述: "每个选择都有代价，没有绝对正确的道路"
    适用场景: "道德困境"
    反套路标签: ["道德模糊", "无完美选择", "灰色地带"]

  - id: "HC012"
    名称: "配角觉醒"
    描述: "故事从配角的视角展开，主角成为背景"
    适用场景: "视角创新"
    反套路标签: ["视角转换", "配角中心", "打破主角中心"]

  - id: "HC013"
    名称: "胜利即失败"
    描述: "主角达到了目标，却发现这导致了更大的灾难"
    适用场景: "结局转折"
    反套路标签: ["目的与后果悖论", "成功背后", "胜利的代价"]

  - id: "HC014"
    名称: "真实谎言"
    描述: "反派说的是真话，主角相信的是谎言"
    适用场景: "信息差构建"
    反套路标签: ["真相与谬误", "认知颠覆", "信息不对称"]

  - id: "HC015"
    名称: "无反派战斗"
    描述: "冲突不是善恶对立，而是理念/立场差异"
    适用场景: "冲突构建"
    反套路标签: ["灰色对立", "无绝对反派", "理念冲突"]

# 反套路元素组合表
元素组合:
  - 组合名: "星际修真+记忆代价"
    元素: ["星际修真文明", "力量代价", "记忆驱动"]
    预期效果: "主角在星际战争中每次使用力量都会失去记忆，最终忘记了自己为何而战"

  - 组合名: "废土朋克+沉默主角"
    元素: ["废土朋克世界", "沉默主角", "行动驱动"]
    预期效果: "废土中不说话的主角靠行动揭示过去，行动成为唯一的叙事语言"

  - 组合名: "赛博都市+盟友即敌人"
    元素: ["赛博都市", "盟友即敌人", "身份危机"]
    预期效果: "都市中主角发现最信任的AI助手是控制系统的核心"

# 套路检测阈值
套路阈值:
  升级流指数: 0.8  # 超过此值建议注入反套路
  打脸场景数: 1    # 每10章超过此数建议注入
  暧昧重复度: 0.6  # 超过此值建议调整
  机械降神次数: 0  # 出现即建议替换