# 灵感基础层模板

> 灵感输出的标准格式。
> 参照：10_方法论/01_灵感捕捉与筛选.md

---

```yaml
type: 类型（玄幻/都市/科幻/悬疑/言情/现实等）
theme: 主题标签
core_conflict: 核心冲突（人vs人/人vs命运/人vs社会/人vs自己）
selling_points:
  - 卖点1
  - 卖点2
  - 卖点3
audience: 目标读者群体

# === 方法论新增字段 ===

## 灵感筛选记录
inspiration_check:
  has_conflict: true/false    # 是否有强烈冲突
  has_contrast: true/false   # 是否有"反差"
  has_emotion: true/false     # 是否有情绪价值
  filter_passed: true/false   # 是否通过筛选

## 一句话故事
one_sentence_story: "谁（主角）+ 想要什么（目标）+ 但遇到什么阻碍（核心冲突）+ 如果失败会怎样（代价）"

## 核心三要素（简要）
core_three_elements:
  protagonist: "主角一句话描述"
  goal: "唯一主目标"
  obstacle: "最大阻碍"

## 类型定位
genre_markers:
  核心契约: "读者期待的叙事规则"
  # 示例：悬疑→"必须给足线索，结尾反转要公平"
  # 示例：言情→"情感张力优先，人物动机要细腻"

## 情绪锚点
emotion_anchor:
  primary: "主要情绪类型（爽/虐/燃/甜等）"
  secondary: "次要情绪类型"
  target_readers_feel: "读者应该有的情感反应"

## 金手指/特殊设定（如有）
special_setup:
  type: "金手指/系统/奇遇/血统等"
  description: "描述"
  constraints: "限制条件（防止主角开挂）"
```

---

## 使用说明

1. 灵感生成后，填写本模板
2. 放入项目灵感目录：`01_灵感库/{项目}/`
3. 后续立项时，深层层.md会引用基础层.yaml的数据