# 世界观设定模板

> 每个项目建立时填写。
> 参照：10_方法论/03_世界观与设定.md

---

## 极简设定表

### 世界/背景

| 维度 | 内容 |
|------|------|
| **时代** | 现代 / 古代 / 未来 / 架空 |
| **时间跨度** | 三天？三个月？一年？三十年？ |
| **主要场景** | 1-2个重点场景，不超过3个 |

### 核心规则

```yaml
core_rules:
  - rule: "..."
    description: "..."
  - rule: "..."
    description: "..."

# 示例（玄幻修仙）：
# core_rules:
#   - rule: "灵气"
#     description: "世界本源能量，修士通过吸纳灵气突破境界"
#   - rule: "境界压制"
#     description: "高境界对低境界有天然压制，但可被特殊体质破解"
```

### 力量体系（可选，如有异能/魔法/修炼）

```yaml
power_system:
  source: "力量从哪里来？血统/修炼/科技/天赋"
  cost: "使用代价是什么？"
  constraints: "限制条件（防止主角开挂）"
  social_attitude: "社会对它的态度（自由/管控/地下）"

  # 示例：
  # source: "觉醒者体内蕴含'火种'，通过情绪波动激发"
  # cost: "每次使用会消耗生命力，过度使用会'燃尽'"
  # constraints: "在禁火区无法使用，特定道具可压制火种"
  # social_attitude: "觉醒者需要登记，异能犯罪量刑加倍"
```

