## 信息释放节奏

**原则**：设定随情节展开，不在开篇堆砌

| 释放方式 | 说明 |
|---------|------|
| 通过角色行动带出 | 而非直接说明 |
| 通过对话展示 | 而非叙述者陈述 |
| 通过冲突揭示 | 而非静态介绍 |

---

## 设定检查清单

- [ ] 核心规则能一句话说清
- [ ] 力量体系有代价（无代价的能力=无意义的 story）
- [ ] 主要场景不超过3个
- [ ] 没有堆砌设定（先写人物，让社会自然浮现）
- [ ] 设定不影响情节推进（设定是为故事服务的）

---

## 使用说明

1. 项目立项后，填写本模板
2. 放入项目立项目录：`01_灵感库/{项目}/立项/世界观设定.yaml`
3. 作家创作时参照此文件，避免设定前后矛盾