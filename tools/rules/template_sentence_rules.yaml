# tools/rules/template_sentence_rules.yaml
# 模板句检测规则
# 格式: pattern (str), name (str), suggestions (list)
template_patterns:
  - pattern: '他[说问道喊叫笑叹谓称著显示露出透露出冒][^。！？]{0,15}[。！？]'
    name: '模板_他说道'
    suggestions:
      - '减少"他说道"的使用，用动作和表情替代'
      - '改为：他抬起下巴，目光冷冽'
      - '改为：嘴角勾起一抹笑'
  - pattern: '她[说问道喊叫笑叹谓称著显示露出透露出冒][^。！？]{0,15}[。！？]'
    name: '模板_她说道'
    suggestions:
      - '减少"她说道"的使用，用动作和表情替代'
      - '改为：她轻抚发丝，声音低沉'
      - '改为：她愣了愣，没有回答'
  - pattern: '只见([^，]。*)'
    name: '模板_只见'
    suggestions:
      - '"只见"过于套路化'
      - '替换：视野中突现、眼前浮现、一道身影落下'
      - '示例：视野中突现一道身影'
  - pattern: '突然([^，]。*)'
    name: '模板_突然'
    suggestions:
      - '"突然"过于平淡'
      - '替换：倏忽、霎时、刹那、一瞬间、蓦然'
      - '示例：空气中霎时弥漫起一股寒意'
  - pattern: '然而([^，]。*)'
    name: '模板_然而'
    suggestions:
      - '过多"然而"削弱转折力度'
      - '替换：但、只是、可惜、无奈、却、偏'
      - '示例：可惜天不遂人愿'
  - pattern: '但是([^，]。*)'
    name: '模板_但是'
    suggestions:
      - '过多"但是"削弱转折力度'
      - '替换：只是、可、可惜、无奈、却'
      - '示例：只是这代价太过沉重'
  - pattern: '因此([^，]。*)'
    name: '模板_因此'
    suggestions:
      - '"因此"过于书面化'
      - '替换：于是、这就、这才、于是乎'
      - '示例：于是众人各自散去'
  - pattern: '随着([^，]。*)'
    name: '模板_随着'
    suggestions:
      - '"随着"过于套路化'
      - '替换：此后、此后不久、就在此时、就在那刻'
      - '示例：就在此时，异变突生'
  - pattern: '如果([^，]。*)'
    name: '模板_如果'
    suggestions:
      - '虚拟语气过多使用'
      - '减少"如果...就"结构，用事实陈述替代'
  - pattern: '于是([^，]。*)'
    name: '模板_于是'
    suggestions:
      - '"于是"使用过度'
      - '替换：接着、随后、然后、此时、下一秒'
      - '示例：下一秒，他消失在原地'
  - pattern: '就在这里([^，]。*)'
    name: '模板_就在此时'
    suggestions:
      - '时间标记过于套路'
      - '替换：恰在此时、偏在这时、正此际'
      - '示例：恰在此时，一道闪电划破夜空'
  - pattern: '不一会儿([^，]。*)'
    name: '模板_不一会儿'
    suggestions:
      - '时间过渡过于简单'
      - '替换：片刻后、少顷、须臾之间、转瞬'
      - '示例：少顷，他睁开双眼'
  - pattern: '很快([^，]。*)'
    name: '模板_很快'
    suggestions:
      - '时间过渡过于模糊'
      - '替换：不多时、半晌、一炷香后'
      - '示例：半晌，他才回过神来'
  - pattern: '看到这一幕([^，]。*)'
    name: '模板_看到这一幕'
    suggestions:
      - '视角转换过于生硬'
      - '替换：目击此景、见状、这一幕映入眼帘'
      - '示例：这一幕映入眼帘，他心头一沉'
  - pattern: '听到这话([^，]。*)'
    name: '模板_听到这话'
    suggestions:
      - '对话引入过于生硬'
      - '替换：话音入耳、闻及此言、此言入心'
      - '示例：话音入耳，他面色微变'