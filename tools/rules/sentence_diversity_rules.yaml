# tools/rules/sentence_diversity_rules.yaml
# 句式多样性检测规则
# 格式: pattern (str), name (str), label (str)
diverse_patterns:
  # === 对话句（基础）===
  - pattern: '「[^」]+」'
    name: 'dialog'
    label: '对话句'
  - pattern: '"[^"]+"'
    name: 'dialog_english'
    label: '对话句(英文)'
  - pattern: '他[说问道喊叫笑叹谓称著显示露出透露出冒][^「"。，！？]*[。！？]?'
    name: 'narrate_he'
    label: '他述句'
  - pattern: '她[说问道喊叫笑叹谓称著显示露出透露出冒][^「"。，！？]*[。！？]?'
    name: 'narrate_she'
    label: '她述句'
  - pattern: '它[说问道喊叫][^「"。，！？]*[。！？]?'
    name: 'narrate_it'
    label: '它述句'
  - pattern: '[林夜苏琳星月铁蛋父亲母亲][^。！？]{0,30}[说问道喊叫]'
    name: 'named_dialog'
    label: '命名人物对话'
  - pattern: '声音[低沉急促平静冷淡愤怒]?[^。！？]*[。！？]?'
    name: 'voice_desc'
    label: '声音描写'
  - pattern: '[喊叫笑喊哭]?道["""「]'
    name: 'dialog_verb'
    label: '对话引导词'

  # === 对话+动作复合句 ===
  - pattern: '[^。，！？]{0,20}[：，][""][^"]+[""][^。！？]*[。！？]'
    name: 'dialog_action'
    label: '对话动作句'
  - pattern: '[^。，！？]{0,15}[：][""][^"]+[""][^。！？]*[。！？]'
    name: 'dialog_colon'
    label: '对话+描述'
  - pattern: '"[^"]+"[，。][^"]*"[^"]+[。！？]'
    name: 'quoted_dialog_chain'
    label: '连续对话'

  # === 动作描写句 ===
  - pattern: '他[伸收抬举握拿抓拉推踢打杀砍劈刺剪拆拔]+[^。！？]*[。！？]?'
    name: 'action_他'
    label: '他动作句'
  - pattern: '她[伸收抬举握拿抓拉推踢打杀砍劈刺剪拆拔]+[^。！？]*[。！？]?'
    name: 'action_她'
    label: '她动作句'
  - pattern: '[林夜苏琳星月铁蛋]+[^。！？]{0,10}[站坐蹲趴躺靠爬跃冲滑]?[^。！？]*[。！？]?'
    name: 'action_named'
    label: '命名人物动作'
  - pattern: '[伸收抬举握拿抓拉推踢打杀砍劈刺剪拆拔扔掉丢接住送打翻拉抽鼓起迈跨踏冲]+[^。！？]*[。！？]?'
    name: 'action_verb'
    label: '动词动作句'
  - pattern: '用[^。！？]{0,20}[刀剑枪拳掌指]+[^。！？]*[。！？]?'
    name: 'tool_action'
    label: '工具动作'

  # === 心理/感知句 ===
  - pattern: '[看听闻尝感到觉得意识到发现意识到]+[^。！？]*[。！？]?'
    name: 'perception'
    label: '感知句'
  - pattern: '他[看听闻尝觉得心想明白意识到]+[^。！？]*[。！？]?'
    name: 'he_perception'
    label: '他感知句'
  - pattern: '她[看听闻尝觉得心想明白意识到]+[^。！？]*[。！？]?'
    name: 'she_perception'
    label: '她感知句'
  - pattern: '林夜[看听闻尝觉得心想明白意识到希望害怕]+[^。！？]*[。！？]?'
    name: 'linye_perception'
    label: '林夜心理'
  - pattern: '苏琳[看听闻尝觉得心想明白意识到希望害怕]+[^。！？]*[。！？]?'
    name: 'sulin_perception'
    label: '苏琳心理'
  - pattern: '心头[^。！？]*[。！？]?'
    name: 'heart_desc'
    label: '心头描写'
  - pattern: '心中[^。！？]*[。！？]?'
    name: 'heart_inner'
    label: '心中描写'
  - pattern: '脑海里?[^。！？]*[。！？]?'
    name: 'mind_desc'
    label: '脑海描写'
  - pattern: '想起[^。！？]*[。！？]?'
    name: 'remember'
    label: '回忆句'
  - pattern: '记得[^。！？]*[。！？]?'
    name: 'recall'
    label: '记得句'

  # === 环境/场景描写句 ===
  - pattern: '黄昏[将染成变作]?[^。！？]*[。！？]?'
    name: 'env_dusk'
    label: '黄昏描写'
  - pattern: '夜色[降临笼罩弥漫充满]?[^。！？]*[。！？]?'
    name: 'env_night'
    label: '夜色描写'
  - pattern: '天空[^。！？]*[。！？]?'
    name: 'env_sky'
    label: '天空描写'
  - pattern: '[风雪雨雷云雾沙尘]+[^。！？]*[。！？]?'
    name: 'env_weather'
    label: '天气描写'
  - pattern: '[光芒光线阳光月光星光光辉光柱]+[^。！？]*[。！？]?'
    name: 'env_light'
    label: '光线描写'
  - pattern: '周围[^。！？]*[。！？]?'
    name: 'env_surround'
    label: '周围描写'
  - pattern: '[房间屋内室内厅堂]+[^。！？]*[。！？]?'
    name: 'env_indoor'
    label: '室内描写'
  - pattern: '[街道野外荒原废墟]+[^。！？]*[。！？]?'
    name: 'env_outdoor'
    label: '室外描写'

  # === 状态描写句 ===
  - pattern: '脸上[^。！？]*[。！？]?'
    name: 'state_face'
    label: '脸部状态'
  - pattern: '眼中[^。！？]*[。！？]?'
    name: 'state_eye'
    label: '眼部状态'
  - pattern: '身体[^。！？]*[。！？]?'
    name: 'state_body'
    label: '身体状态'
  - pattern: '他的[^。！？]{0,30}[，][^。！？]*[。！？]?'
    name: 'state_他'
    label: '他的状态'
  - pattern: '她的[^。！？]{0,30}[，][^。！？]*[。！？]?'
    name: 'state_她'
    label: '她的状态'
  - pattern: '[身影背影身形]+[^。！？]*[。！？]?'
    name: 'state_figure'
    label: '身影状态'

  # === 时间/进程句 ===
  - pattern: '那一刻[^。！？]*[。！？]?'
    name: 'time_moment'
    label: '那一刻'
  - pattern: '下一秒[^。！？]*[。！？]?'
    name: 'time_next'
    label: '下一秒'
  - pattern: '片刻之后[^。！？]*[。！？]?'
    name: 'time_after'
    label: '片刻之后'
  - pattern: '不多时[^。！？]*[。！？]?'
    name: 'time_soon'
    label: '不多时'
  - pattern: '须臾之间[^。！？]*[。！？]?'
    name: 'time_instant'
    label: '须臾之间'
  - pattern: '转瞬之间[^。！？]*[。！？]?'
    name: 'time_flash'
    label: '转瞬之间'
  - pattern: '与此同时[^。！？]*[。！？]?'
    name: 'time_same'
    label: '与此同时'
  - pattern: '就在这里[^。！？]*[。！？]?'
    name: 'time_here'
    label: '就在这里'
  - pattern: '霎时[^。！？]*[。！？]?'
    name: 'time_sudden'
    label: '霎时'
  - pattern: '少顷[^。！？]*[。！？]?'
    name: 'time_short'
    label: '少顷'

  # === 因果/条件句 ===
  - pattern: '因为[^，]。*[。！？]?'
    name: 'cause_因为'
    label: '因果句'
  - pattern: '由于[^，]。*[。！？]?'
    name: 'cause_由于'
    label: '因果句'
  - pattern: '所以[^，]。*[。！？]?'
    name: 'cause_所以'
    label: '因果句'
  - pattern: '因此[^，]。*[。！？]?'
    name: 'cause_因此'
    label: '因果句'
  - pattern: '从而[^，]。*[。！？]?'
    name: 'cause_从而'
    label: '因果句'
  - pattern: '如果[^，]。*[。！？]?'
    name: 'cond_如果'
    label: '条件句'
  - pattern: '要是[^，]。*[。！？]?'
    name: 'cond_if'
    label: '条件句'
  - pattern: '只要[^，]。*[。！？]?'
    name: 'cond_只要'
    label: '条件句'
  - pattern: '除非[^，]。*[。！？]?'
    name: 'cond_unless'
    label: '条件句'
  - pattern: '无论[^，]。*[。！？]?'
    name: 'cond_no matter'
    label: '条件句'

  # === 转折/对比句 ===
  - pattern: '但是[^，]。*[。！？]?'
    name: 'contrast_但是'
    label: '转折句'
  - pattern: '然而[^，]。*[。！？]?'
    name: 'contrast_然而'
    label: '转折句'
  - pattern: '不过[^，]。*[。！？]?'
    name: 'contrast_不过'
    label: '转折句'
  - pattern: '只是[^，]。*[。！？]?'
    name: 'contrast_只是'
    label: '转折句'
  - pattern: '可惜[^，]。*[。！？]?'
    name: 'contrast_可惜'
    label: '转折句'
  - pattern: '却[^，]。*[。！？]?'
    name: 'contrast_却'
    label: '转折句'
  - pattern: '尽管[^，]。*[。！？]?'
    name: 'concession_尽管'
    label: '让步句'
  - pattern: '虽然[^，]。*[。！？]?'
    name: 'concession_虽然'
    label: '让步句'
  - pattern: '即使[^，]。*[。！？]?'
    name: 'concession_even'
    label: '让步句'

  # === 递进/并列句 ===
  - pattern: '不仅[^，]。*[，][^。！？]*[而且甚至]?[。！？]?'
    name: 'progressive_not only'
    label: '递进句'
  - pattern: '而且[^，]。*[。！？]?'
    name: 'progressive_and'
    label: '递进句'
  - pattern: '甚至[^，]。*[。！？]?'
    name: 'progressive_even'
    label: '递进句'
  - pattern: '既[^，]。*[，][^。！？]*[又也且]?[。！？]?'
    name: 'parallel_both'
    label: '并列句'
  - pattern: '[或者还是或是]?[^，]+[，][^。！？]*[。！？]?'
    name: 'parallel_or'
    label: '并列句'

  # === 被动/把字句 ===
  - pattern: '被[^。，！？]{1,20}[了着过]'
    name: 'passive'
    label: '被动句'
  - pattern: '把[^。，！？]{1,30}[了着]'
    name: 'ba_construction'
    label: '把字句'
  - pattern: '让[^。！？]{1,15}[^。！？]*[。！？]?'
    name: 'let_action'
    label: '让字句'
  - pattern: '使[^。！？]{1,15}[^。！？]*[。！？]?'
    name: 'cause_action'
    label: '使字句'

  # === 疑问/反问/感叹句 ===
  - pattern: '[^。！？]*[吗呢吧嘛呀啊][。！？]?'
    name: 'question_particle'
    label: '疑问句'
  - pattern: '[^。！？]*[谁什么哪几怎么如何为何为什么哪里哪个][^。！？]*[？?]'
    name: 'question_wh'
    label: '疑问词句'
  - pattern: '难道[^。！？]+[吗呢不成][。！？]?'
    name: 'rhetorical_难道'
    label: '反问句'
  - pattern: '岂能[^。！？]+[。！？]?'
    name: 'rhetorical_岂'
    label: '反问句'
  - pattern: '[^。！？]*![。！？]?'
    name: 'exclamatory'
    label: '感叹句'
  - pattern: '[^。！？]*啊[。！？]?'
    name: 'exclaim_ah'
    label: '感叹句'
  - pattern: '[^。！？]*呀[。！？]?'
    name: 'exclaim_ya'
    label: '感叹句'

  # === 祈使句 ===
  - pattern: '^[你要您咱们大家][^。！？]{0,20}[！。]'
    name: 'imperative_你'
    label: '祈使句'
  - pattern: '^[勿莫别不要不许不可]*[^。！？]{0,15}[！。]'
    name: 'imperative_no'
    label: '祈使句'
  - pattern: '^[来去走跑站坐][^。！？]{0,15}[！。]'
    name: 'imperative_go'
    label: '祈使句'
  - pattern: '^[给我帮我替我]?[^。！？]{0,15}[！。]'
    name: 'imperative_give'
    label: '祈使句'
  - pattern: '^"[^"]*[""]?[^。！？]{0,10}[！。]'
    name: 'imperative_dialog'
    label: '祈使句'

  # === 省略句/短句 ===
  - pattern: '^，、[^。！？]{0,10}[。！？]'
    name: 'elliptical'
    label: '省略句'
  - pattern: '^\.{3,}[^。！？]*[。！？]?'
    name: 'elliptical_dots'
    label: '省略句'
  - pattern: '^[^。，！？]{1,15}$'
    name: 'short_sentence'
    label: '短句'

  # === 连动/兼语句 ===
  - pattern: '请[^。！？]{1,15}[^。！？]+[做去来][^。！？]*[。！？]?'
    name: 'pivotal_请'
    label: '兼语句'
  - pattern: '让[^。！？]{1,10}[^。！？]+[做去来][^。！？]*[。！？]?'
    name: 'pivotal_让'
    label: '兼语句'
  - pattern: '派[^。！？]{1,10}[^。！？]+[去来][^。！？]*[。！？]?'
    name: 'pivotal_send'
    label: '兼语句'
  - pattern: '叫[^。！？]{1,10}[^。！？]+[去来做][^。！？]*[。！？]?'
    name: 'pivotal_call'
    label: '兼语句'

  # === 双宾句 ===
  - pattern: '给[^。！？]{1,10}[^。！？]{1,10}[^。！？]{1,10}[了着][。！？]?'
    name: 'double_io_给'
    label: '双宾句'
  - pattern: '送[^。！？]{1,10}[^。！？]{1,10}[^。！？]{1,10}[了着][。！？]?'
    name: 'double_io_送'
    label: '双宾句'
  - pattern: '交给[^。！？]{1,10}[^。！？]{1,10}[了着][。！？]?'
    name: 'double_io_交给'
    label: '双宾句'

  # === 目的/解说句 ===
  - pattern: '为了[^，]。*[，][^。！？]*[。！？]?'
    name: 'purpose_为了'
    label: '目的句'
  - pattern: '以便[^，]。*[。！？]?'
    name: 'purpose_以便'
    label: '目的句'
  - pattern: '即[^，]。*[，][^。！？]*[。！？]?'
    name: 'explanatory_即'
    label: '解说句'
  - pattern: '也就是说[^，]。*[。！？]?'
    name: 'explanatory_也就是说'
    label: '解说句'
  - pattern: '所谓[^，]。*[，][^。！？]*[。！？]?'
    name: 'explanatory_所谓'
    label: '解说句'

  # === 描写句（扩展）===
  - pattern: '只见[^，]。*[。！？]?'
    name: 'desc_只见'
    label: '描写句'
  - pattern: '忽见[^，]。*[。！？]?'
    name: 'desc_忽见'
    label: '描写句'
  - pattern: '但见[^，]。*[。！？]?'
    name: 'desc_但见'
    label: '描写句'
  - pattern: '忽然[^，]。*[。！？]?'
    name: 'desc_忽然'
    label: '描写句'
  - pattern: '突然[^，]。*[。！？]?'
    name: 'desc_突然'
    label: '描写句'
  - pattern: '猛然[^，]。*[。！？]?'
    name: 'desc_猛然'
    label: '描写句'
  - pattern: '此时[^，]。*[。！？]?'
    name: 'desc_at this time'
    label: '描写句'
  - pattern: '眼前[^，]。*[。！？]?'
    name: 'desc_before eyes'
    label: '描写句'
  - pattern: '视野中[^，]。*[。！？]?'
    name: 'desc_vision'
    label: '描写句'
  - pattern: '一道[^，]。*[。！？]?'
    name: 'desc_one line'
    label: '描写句'
  - pattern: '声音[^，]。*[。！？]?'
    name: 'desc_sound'
    label: '描写句'

  # === 专业/术语句 ===
  - pattern: '[能量波动信号数据系统程序]+[^。！？]*[。！？]?'
    name: 'tech_term'
    label: '科技术语'
  - pattern: '[宇宙星辰星系]+[^。！？]*[。！？]?'
    name: 'astro_term'
    label: '天文术语'
  - pattern: '[变异兽暗域]+[^。！？]*[。！？]?'
    name: 'world_term'
    label: '世界术语'

  # === 陈述句（兜底，适配中文小说特点）===
  - pattern: '^[^\n。！？]{2,100}[。！？\n]'
    name: 'declarative'
    label: '陈述句'
  - pattern: '那[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_那'
    label: '那字句'
  - pattern: '这[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_这'
    label: '这字句'
  - pattern: '他[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_他'
    label: '他字句'
  - pattern: '她[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_她'
    label: '她字句'
  - pattern: '它[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_它'
    label: '它字句'
  - pattern: '他们[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_他们'
    label: '他们句'
  - pattern: '她们[^，]。*[，][^。！？]*[。！？]'
    name: 'declarative_她们'
    label: '她们句'
  - pattern: '然后[^，]。*[。！？]?'
    name: 'declarative_然后'
    label: '然后句'
  - pattern: '接着[^，]。*[。！？]?'
    name: 'declarative_then'
    label: '接着句'
  - pattern: '随后[^，]。*[。！？]?'
    name: 'declarative_after'
    label: '随后句'