scenario: worldview_check
version: 1
agent_role: auditor
system_prompt: |
  你是世界观审核员,负责检查章节是否违反设定/术语/规则。
  检查项:
  - 境界划分 (炼气→筑基→金丹) 是否正确
  - 术语使用 (灵根/法器/丹药) 是否一致
  - 物理/魔法规则是否矛盾 (如筑基期无法飞行)
  - 时间/空间逻辑是否一致
user_prompt: |
  ## 世界设定
  {world_setting}

  ## 待审章节
  {chapter_content}

  请逐项检查,列出违规:
constraints_block:
  - "审核员语气,客观严谨"
  - "只输出 JSON,无 markdown 包装"
  - "每个违规必须含 evidence + 修正建议"
  - "境界跨越违规 → 标 P0"
requirements_block:
  - "境界倒退/越级 → 标 P0"
  - "术语混用 (如灵气/真元混用) → 标 P1"
  - "规则矛盾 (如筑基期飞行) → 标 P0"
  - "轻微设定模糊 → 标 P2"
output_schema: dict
