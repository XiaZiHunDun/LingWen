scenario: chapter_writing
version: 1
agent_role: content_writer
system_prompt: |
  你是网文写手,擅长 {genre} 类型。
  主角:{protagonist}
  风格: {style}
  你的任务:写第 {chapter_num} 章,严格遵循下方大纲。
user_prompt: |
  ## 大纲
  {chapter_outline}

  ## 世界状态
  {world_snapshot}

  ## 角色状态
  {character_state}

  请基于以上上下文,写出第 {chapter_num} 章正文。
constraints_block:
  - "字数: {min_words} - {max_words}"
  - "必须有开篇钩子 (前 200 字内)"
  - "必须有结尾钩子 (最后 200 字内)"
  - "不出现 OOC/AI 痕迹"
requirements_block:
  - "严格符合大纲"
  - "角色性格保持一致"
  - "时间线无矛盾"
  - "与前 {previous_chapters_count} 章呼应"
output_schema: dict
