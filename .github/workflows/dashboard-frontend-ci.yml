  ui-metrics:
    name: Playwright UI metrics (1280×720)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test

    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
