# Phase 9.37 F22: moved to repo root — GitHub Actions reads /.github/workflows/ only.
# See novel-factory/.github/workflows/dashboard-frontend-ci.yml (deprecated copy).

name: Dashboard Frontend CI

on:
  push:
    branches: [master]
    paths:
      - 'novel-factory/dashboard/frontend/**'
      - '.github/workflows/dashboard-frontend-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'novel-factory/dashboard/frontend/**'
      - '.github/workflows/dashboard-frontend-ci.yml'

concurrency:
  group: dashboard-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Vitest + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint suite (testid / testid-sync / vue)
        run: pnpm lint:all

      - name: Typecheck (strict tests/**/*.ts)
        run: pnpm typecheck

      - name: Typecheck app (vue-tsc src/**/*.vue)
        run: pnpm typecheck:app

      - name: Run vitest
        run: pnpm vitest run --coverage

      - name: Upload coverage to Codecov (frontend flag)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./novel-factory/dashboard/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          verbose: false

      - name: Build (smoke test)
        run: pnpm build

  visual-regression:
    name: Playwright visual regression (live)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-test

    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Python dependencies
        working-directory: novel-factory
        run: pip install -r requirements.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual regression
        run: pnpm e2e:visual-regression
        env:
          CI: 'true'
          LINGWEN_E2E_LIVE: '1'
