# Phase 9.37 F22: moved to repo root — GitHub Actions reads /.github/workflows/ only.
# Real Anthropic API tests — manual only (no schedule; avoid surprise API bills).

name: real-llm-tests

on:
  workflow_dispatch:

concurrency:
  group: real-llm-tests-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: novel-factory

jobs:
  real-llm-tests:
    name: Real LLM tests (Anthropic, Python 3.13)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ANTHROPIC_API_KEY secret
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set in repo Settings → Secrets → Actions"
            exit 1
          fi

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run real LLM tests (Anthropic only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest tests/agent_system/test_novel_writing_real_llm.py \
            -k "TestNovelWritingRealLLM or TestPolishMergeSynthesisRealLLM or TestNovelWritingBudgetRealLLM" \
            --tb=short -v

      - name: Ruff (informational, non-blocking)
        run: |
          pip install ruff
          ruff check tests/agent_system/test_novel_writing_real_llm.py tests/agent_system/_e2e_helpers.py \
            || echo "::warning::Ruff found issues (informational only)"

      - name: Upload pytest output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-llm-tests-output
          path: |
            novel-factory/.pytest_cache/
            novel-factory/pytest.log
          retention-days: 14
          if-no-files-found: ignore
