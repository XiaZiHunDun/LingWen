# Phase 9.37 F22: pytest CI gate at repo root (GitHub only reads /.github/workflows/)
# Python tests run in novel-factory/ (working-directory below).
# Legacy copy under novel-factory/.github/workflows/ is deprecated — do not edit there.

name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: novel-factory

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest tests/ \
            --ignore=tests/agent_system/test_e2e_workflow.py \
            --ignore=tests/tools/test_enhancement_tools.py \
            --cov=infra --cov=tools --cov=dashboard \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=30 \
            --timeout=120 \
            -q

      - name: Upload coverage to Codecov (backend flag)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./novel-factory/coverage.xml
          flags: backend
          fail_ci_if_error: false
          verbose: false

      - name: Ruff (informational, non-blocking)
        if: matrix.python-version == '3.13'
        run: |
          pip install ruff
          ruff check . --statistics || echo "::warning::Ruff found issues (informational only)"

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: novel-factory/.coverage
          retention-days: 7
