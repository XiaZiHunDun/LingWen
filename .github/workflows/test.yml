# Phase 9.37 F22: pytest CI gate at repo root (GitHub only reads /.github/workflows/)
# Python tests run in novel-factory/ (working-directory below).
# Legacy copy under novel-factory/.github/workflows/ is deprecated — do not edit there.

name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_llm_golden_set:
        description: "Also run optional llm-golden-set (jinghai single book)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: novel-factory

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest tests/ \
            --ignore=tests/agent_system/test_e2e_workflow.py \
            --ignore=tests/tools/test_enhancement_tools.py \
            --cov=infra --cov=tools --cov=dashboard \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50 \
            --timeout=120 \
            -q

      - name: Verify per-module coverage gate (Phase 11.11)
        if: matrix.python-version == '3.13'
        run: bash scripts/verify-coverage-modules.sh

      - name: Upload coverage to Codecov (backend flag)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./novel-factory/coverage.xml
          flags: backend
          fail_ci_if_error: false
          verbose: false

      - name: Ruff (blocking gate, Phase 10.38)
        if: matrix.python-version == '3.13'
        run: |
          pip install ruff
          ruff check .

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: novel-factory/.coverage
          retention-days: 7

  golden-set:
    name: golden-set smoke (${{ matrix.slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: [anye-xinbiao, huiyu-dangan, xingyun-jiyuan, jinghai-rizhi, xuexian-dangan, huangsha-dangan, anhe-dangan, tiedao-dangan]
    defaults:
      run:
        working-directory: novel-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify golden set structure + rule check
        run: bash scripts/verify-golden-set.sh ${{ matrix.slug }}

  onboarding-smoke:
    name: onboarding smoke (init → preflight → dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novel-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify onboarding pipeline
        run: bash scripts/verify-onboarding.sh ci-smoke

  vitest:
    name: Vitest (frontend unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Run vitest
        run: pnpm vitest run
      - name: Lint (blocking)
        run: pnpm lint:all
      - name: Build (blocking)
        run: pnpm build

  llm-golden-set:
    name: LLM golden-set (optional, needs MINIMAX_API_KEY)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_llm_golden_set == true) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'llm-check'))
    defaults:
      run:
        working-directory: novel-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check secret present
        id: secret
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [[ -z "${MINIMAX_API_KEY}" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SKIP: MINIMAX_API_KEY not configured"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: LLM golden-set (jinghai-rizhi)
        if: steps.secret.outputs.present == 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          export LINGWEN_PROJECT_ROOT="$(pwd)/projects/jinghai-rizhi"
          bash scripts/run-golden-set-check.sh jinghai-rizhi
          python lingwen.py check 1,5,10 --llm --limit 3

  llm-golden-primary:
    name: LLM golden primary (${{ matrix.slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: [jinghai-rizhi, huiyu-dangan, tiedao-dangan, anye-xinbiao, xuexian-dangan, huangsha-dangan, anhe-dangan]
    defaults:
      run:
        working-directory: novel-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Require MINIMAX_API_KEY (primary revision blocking gate)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [[ -z "${MINIMAX_API_KEY}" ]]; then
            echo "::error::MINIMAX_API_KEY required for llm-golden-primary (七样章 blocking gate)"
            exit 1
          fi
      - name: LLM Golden check (blocking P0)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: bash scripts/run-llm-golden-check.sh ${{ matrix.slug }}

  e2e-live:
    name: Playwright live-backend (5 specs)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: novel-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: novel-factory/pyproject.toml
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: novel-factory/dashboard/frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        working-directory: novel-factory/dashboard/frontend
        run: |
          pnpm exec playwright install --with-deps chromium \
            || pnpm exec playwright install chromium
      - name: Run live-backend e2e
        working-directory: novel-factory/dashboard/frontend
        env:
          CI: "true"
          LINGWEN_E2E_LIVE: "1"
        run: pnpm e2e:live
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-trace
          path: novel-factory/dashboard/frontend/test-results/
          if-no-files-found: ignore
      - name: Write job summary
        if: always()
        working-directory: novel-factory
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### Playwright live-backend — passed" >> "$GITHUB_STEP_SUMMARY"
            echo "- Playwright **live-backend** project (5 tests)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Local parity: \`bash scripts/verify-e2e-live-ci.sh\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Playwright live-backend — failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Download artifact **playwright-live-trace** (if present)." >> "$GITHUB_STEP_SUMMARY"
          fi
