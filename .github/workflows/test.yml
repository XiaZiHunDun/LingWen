# Phase 9.37 F22: pytest CI gate at repo root (GitHub only reads /.github/workflows/)
# Python tests run in repo root ( (working-directory below).
# Legacy copy under .github/workflows/ is deprecated — do not edit there.

name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_llm_golden_set:
        description: "Also run optional llm-golden-set (jinghai single book)"
        required: false
        default: false
        type: boolean
      run_llm_golden_primary:
        description: "Force llm-golden-primary ×7 (overrides path filter)"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
jobs:
  llm-paths:
    name: Detect LLM-relevant changes
    runs-on: ubuntu-latest
    outputs:
      llm: ${{ steps.filter.outputs.llm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            llm:
              - 'projects/**'
              - 'infra/**'
              - 'scripts/run-llm-golden*.sh'
              - 'scripts/run-golden-set*.sh'
              - 'scripts/verify-golden-set.sh'
              - 'lingwen.py'
              - 'config/**'
              - '.github/workflows/test.yml'

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest tests/ \
            --ignore=tests/agent_system/test_e2e_workflow.py \
            --ignore=tests/tools/test_enhancement_tools.py \
            --cov=infra --cov=tools --cov=dashboard \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50 \
            --timeout=120 \
            -q

      - name: Verify per-module coverage gate (Phase 11.11)
        if: matrix.python-version == '3.13'
        run: bash scripts/verify-coverage-modules.sh

      - name: Upload coverage to Codecov (backend flag)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          verbose: false

      - name: Ruff (blocking gate, Phase 10.38)
        if: matrix.python-version == '3.13'
        run: |
          pip install ruff
          ruff check .

      - name: Verify Phase 13.0 P1 stabilization (T1-T5, additive-only)
        if: matrix.python-version == '3.13'
        working-directory: ./
        run: bash scripts/verify-p1-stabilization.sh

      - name: Verify Phase 14.0 P2 performance (T1-T3, additive-only)
        if: matrix.python-version == '3.13'
        working-directory: ./
        run: bash scripts/verify-p2-performance.sh

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  golden-set:
    name: golden-set smoke (${{ matrix.slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: [anye-xinbiao, huiyu-dangan, xingyun-jiyuan, jinghai-rizhi, xuexian-dangan, huangsha-dangan, anhe-dangan, tiedao-dangan]
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify golden set structure + rule check
        run: bash scripts/verify-golden-set.sh ${{ matrix.slug }}

  onboarding-smoke:
    name: onboarding smoke (init → preflight → dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify onboarding pipeline
        run: bash scripts/verify-onboarding.sh ci-smoke

  vitest:
    name: Vitest (frontend unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: dashboard/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Run vitest
        run: pnpm vitest run
      - name: Lint (blocking)
        run: pnpm lint:all
      - name: Build (blocking)
        run: pnpm build

  llm-golden-set:
    name: LLM golden-set (optional, needs MINIMAX_API_KEY)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_llm_golden_set == true) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'llm-check'))
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check secret present
        id: secret
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [[ -z "${MINIMAX_API_KEY}" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SKIP: MINIMAX_API_KEY not configured"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: LLM golden-set (jinghai-rizhi)
        if: steps.secret.outputs.present == 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          export LINGWEN_PROJECT_ROOT="$(pwd)/projects/jinghai-rizhi"
          bash scripts/run-golden-set-check.sh jinghai-rizhi
          python lingwen.py check 1,5,10 --llm --limit 3

  llm-golden-primary:
    name: LLM golden primary (${{ matrix.slug }})
    needs: llm-paths
    if: |
      needs.llm-paths.outputs.llm == 'true' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'llm-check')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_llm_golden_primary == true)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: [jinghai-rizhi, huiyu-dangan, tiedao-dangan, anye-xinbiao, xuexian-dangan, huangsha-dangan, anhe-dangan]
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Require MINIMAX_API_KEY (primary revision blocking gate)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [[ -z "${MINIMAX_API_KEY}" ]]; then
            echo "::error::MINIMAX_API_KEY required for llm-golden-primary (七样章 blocking gate)"
            exit 1
          fi
      - name: LLM Golden check (blocking P0)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: bash scripts/run-llm-golden-check.sh ${{ matrix.slug }}

  # Playwright live-backend E2E moved to dashboard-frontend-ci.yml (e2e-live job).
