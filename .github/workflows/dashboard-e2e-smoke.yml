# Phase 9.48 F37: opt-in Playwright smoke (NOT primary merge gate).
# Trigger: manual workflow_dispatch OR PR label `e2e-smoke`.
# Primary frontend gate remains dashboard-frontend-ci.yml (vitest).

name: Dashboard E2E Smoke (opt-in)

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: dashboard-e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: Playwright smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: pnpm e2e:smoke
        env:
          CI: 'true'

  visual-regression:
    name: Playwright visual regression
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: novel-factory/dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: novel-factory/dashboard/frontend/pnpm-lock.yaml

      - name: Install Python dependencies
        working-directory: novel-factory
        run: pip install -r requirements.txt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual regression
        run: pnpm e2e:visual-regression
        env:
          CI: 'true'
          LINGWEN_E2E_LIVE: '1'

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: novel-factory/dashboard/frontend/test-results/
          if-no-files-found: ignore
