# 玄幻风格指南
# 版本: v1.0.0
# 更新日期: 2026-05-19

schema_version: "v1.0"

style_info:
  genre: 玄幻
  base_temperature: 0.7
  description: "玄幻小说风格指南，包含修真、魔法等超自然元素的作品"

# ==================== 语言风格 ====================
language_style:
  整体基调:
    - 古典韵味与现代叙事结合
    - 半文半白过渡自然
    - 用词古雅但不晦涩
    - 意境描写优先于直白叙述

  词汇特征:
    动词: ["运转", "凝聚", "浮现", "弥漫", "席卷", "倾泻", "贯穿"]
    名词: ["灵气", "灵根", "金丹", "元婴", "天劫", "法则", "道韵"]
    形容词: ["浩瀚", "磅礴", "玄奥", "精纯", "澎湃", "苍茫"]
    副词: ["缓缓", "骤然", "陡然", "蓦然", "徐徐"]

  句式特点:
    - 长短句交错，营造阅读节奏
    - 四字格运用，增强韵律感
    - 主动句为主，被动句用于强调
    - 善用对仗和排比

# ==================== 描写规范 ====================
description_standards:
  场景描写:
    自然环境:
      - 山水云雾，动静结合
      - 四季变化与情感呼应
      - 修炼环境描写注重灵气描绘
      - 战斗环境注重气势渲染

    建筑描写:
      - 宗门府邸：庄严大气
      - 洞府秘境：神秘幽深
      - 市井街巷：烟火气息
      - 宫殿庙宇：恢弘壮丽

    战斗描写:
      - 招式的动静疾徐
      - 灵力流动的光影效果
      - 战斗节奏的起伏
      - 战斗余波的环境影响

  人物描写:
    外貌:
      - 修士：仙风道骨、气质出尘
      - 妖族：兽耳、尾巴等特征
      - 魔修：邪魅、阴鸷气质
      - 常用比喻：剑眉星目、面如冠玉等

    心理:
      - 内敛型：动作暗示心理
      - 外放型：直陈内心想法
      - 通过修炼状态反映心理

  能力描写:
    招式命名:
      - 动静结合：风起云涌、龙啸九天
      - 自然元素：烈火燎原、寒冰封天
      - 意境深远：大道五十、天衍四十九
      - 简洁有力：一剑破万法

    能力效果:
      - 视觉：光芒、色彩、形态变化
      - 听觉：轰鸣、破空、呼啸
      - 感觉：温度、压力、震动
      - 范围：点、线、面、空间

# ==================== 对话规范 ====================
dialogue_style:
  修士对话:
    - 简洁有力，言简意赅
    - 常用"道友"、"道友所言甚是"
    - 避免过多客套
    - 机锋暗藏，含蓄有力

  师徒对话:
    - 师父：威严中带关怀
    - 徒弟：恭敬中带亲近
    - 传授心法时：详细严谨
    - 日常交流：自然流畅

  情感对话:
    - 含蓄表达，借助景物
    - 不直白说"我爱你"
    - 用承诺、责任表达情感
    - 通过行为而非言语表达

# ==================== 节奏规范 ====================
pacing_standards:
  章节节奏:
    开篇:
      - 悬念开篇或场景建立
      - 快速切入核心情节
      - 避免过多背景介绍

    中段:
      - 情节推进为主线
      - 插叙补充必要信息
      - 伏笔埋设自然
      - 张弛有度，避免疲劳

    结尾:
      - 高潮场景要有冲击力
      - 悬念结尾或情感落点
      - 留白适度，给读者想象

  战斗节奏:
    - 铺垫：实力试探
    - 高潮：底牌尽出
    - 转折：意外发生
    - 结局：胜负分明

  升级节奏:
    - 困难准备：资源收集、瓶颈突破
    - 升级节点：小境界、中境界、大境界
    - 每个境界要有标志事件
    - 升级后的实力展示

# ==================== 禁忌事项 ====================
prohibited:
  用词:
    - 现代用语：PK、GDP等
    - 过于直白的表达
    - 网络流行语（除非特殊设定）
    - 与设定冲突的力量描述

  情节:
    - 战力崩盘（越级挑战要有铺垫）
    - 感情线突兀发展
    - 伏笔不回收
    - 设定前后矛盾

  风格:
    - 过于口语化
    - 过度使用感叹号
    - 连续的短句堆砌
    - 过于翻译腔的句式

# ==================== 优秀示例参考 ====================
reference_examples:
  场景描写:
    - 仙门："缥缈峰上，云海翻涌，灵气充沛，一座座宫殿若隐若现"
    - 战斗："剑光如虹，撕裂长空，所过之处，虚空尽碎"

  人物描写:
    - 主角出场："一袭青衫，面如冠玉，眉宇间有股出尘之气"
    - 反派出场："黑袍笼罩，看不清面容，周身魔气翻涌"

  心理描写:
    - 修炼瓶颈："他感到体内的灵力像是被困在笼中的野兽，疯狂冲撞却找不到出口"
    - 突破瞬间："那一刻，他仿佛听到了大道之音，体内的灵力如同百川归海，奔涌而入"

  对话示例:
    - 修士论道："道可道，非常道。你的剑道，还差一味'舍'字"
    - 师徒对话："师父，这《太上感应篇》，弟子已经熟读千遍，却总是不得其门而入"

# ==================== 温度参数参考 ====================
temperature_recommendations:
  大纲生成: 0.6
  战斗场景: 0.75
  情感场景: 0.65
  对话场景: 0.65
  日常场景: 0.6
  修炼突破: 0.7
  秘密揭示: 0.65

# ==================== 质量检查清单 ====================
quality_checklist:
  - label: "语言风格符合玄幻设定"
    description: "无现代用语，用词古雅但不晦涩"
  - label: "能力描写有层次感"
    description: "招式命名、效果描述系统化"
  - label: "战斗节奏控制得当"
    description: "张弛有度，有铺垫有爆发"
  - label: "升级体系自洽"
    description: "战力对比合理，无战力崩盘"
  - label: "情感表达含蓄有意境"
    description: "借景抒情，避免直白"
  - label: "伏笔布局合理"
    description: "埋设有据，回收有序"